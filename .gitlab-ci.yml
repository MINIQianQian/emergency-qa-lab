#     - poetry run uvicorn emergency_qa_lab.emergency_service.main:app --host 127.0.0.1 --port 8000 &
#     - poetry run behave

e2e_tests:
  stage: e2e
  image: mcr.microsoft.com/playwright/python:v1.58.0-jammy
  # ✅ override global before_script
  before_script:
    - python --version
    - pip install --no-cache-dir poetry
    - poetry config virtualenvs.create false
    - poetry install --no-interaction --no-ansi
    # 打印 playwright 版本（调试用）
    - poetry run pip show playwright
    # - poetry run python -c "import playwright; print('playwright version:', playwright.__version__)"
    - poetry run playwright install chromium
  script:
    - poetry run uvicorn emergency_qa_lab.emergency_service.main:app --host 127.0.0.1 --port 8000 &
    - poetry run python tests/utils/wait_for_service.py http://127.0.0.1:8000/health
    - poetry run pytest -m e2e -q --junitxml=e2e-report.xml --output=playwright-report
  artifacts:
    when: always
    reports:
      junit: e2e-report.xml
    paths:
      - e2e-report.xml
      - playwright-report/
      - test-results/
    expire_in: 7 days

